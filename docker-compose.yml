
services:
  app:
    build: .
    ports:
      - "3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ADAPTER_MODE=memory
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
