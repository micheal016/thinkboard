<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-Time Collaborative Whiteboard — distributed systems demo">
  <title>ThinkBoard — Real-Time Collaborative Whiteboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="join-screen" class="join-screen">
    <div class="join-card glass">
      <div class="join-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="4" width="40" height="40" rx="8" stroke="url(#lg)" stroke-width="3" fill="none"/>
          <circle cx="16" cy="16" r="4" fill="#e94560"/><circle cx="32" cy="16" r="4" fill="#533483"/>
          <circle cx="16" cy="32" r="4" fill="#16c79a"/><circle cx="32" cy="32" r="4" fill="#f7b731"/>
          <defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#e94560"/><stop offset="100%" stop-color="#533483"/></linearGradient></defs>
        </svg>
      </div>
      <h1 class="join-title">ThinkBoard</h1>
      <p class="join-subtitle">Real-Time Collaborative Whiteboard</p>
      <div class="join-form">
        <div class="input-group">
          <label for="username-input">Your Name</label>
          <input type="text" id="username-input" placeholder="Enter your name..." maxlength="20" autocomplete="off">
        </div>
        <div class="input-group">
          <label for="room-input">Room ID</label>
          <div class="room-input-row">
            <input type="text" id="room-input" placeholder="Enter room ID..." maxlength="30" autocomplete="off">
            <button id="generate-room-btn" class="btn-icon" title="Generate random room">&#x21bb;</button>
          </div>
        </div>
        <button id="join-btn" class="btn-primary"><span>Join Room</span> &rarr;</button>
      </div>
      <div class="join-features">
        <div class="feature-tag"><span class="dot dot-green"></span> WebSockets</div>
        <div class="feature-tag"><span class="dot dot-purple"></span> CRDT Sync</div>
        <div class="feature-tag"><span class="dot dot-red"></span> Presence</div>
        <div class="feature-tag"><span class="dot dot-yellow"></span> Scalable</div>
      </div>
    </div>
  </div>

  <div id="whiteboard-screen" class="whiteboard-screen hidden">
    <header id="top-bar" class="top-bar glass">
      <div class="top-bar-left">
        <div class="room-info">
          <span class="room-label">Room:</span>
          <span id="room-id-display" class="room-id"></span>
          <button id="copy-room-btn" class="btn-icon-sm" title="Copy room link">&#128203;</button>
        </div>
      </div>
      <div class="top-bar-center">
        <div id="connection-status" class="connection-status">
          <span class="status-dot"></span><span class="status-text">Connecting...</span>
        </div>
      </div>
      <div class="top-bar-right">
        <div id="presence-avatars" class="presence-avatars"></div>
        <button id="leave-btn" class="btn-ghost" title="Leave room">Leave</button>
      </div>
    </header>

    <aside id="toolbar" class="toolbar glass">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pen" title="Pen (P)">&#9998;</button>
        <button class="tool-btn" data-tool="line" title="Line (L)">&#9135;</button>
        <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">&#9634;</button>
        <button class="tool-btn" data-tool="circle" title="Circle (C)">&#9675;</button>
        <button class="tool-btn" data-tool="text" title="Text (T)">T</button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">&#9003;</button>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-group">
        <div class="color-picker-wrap">
          <input type="color" id="color-picker" value="#ffffff" class="color-picker">
          <div id="color-preview" class="color-preview" style="background:#ffffff;"></div>
        </div>
        <div class="color-presets">
          <button class="color-swatch active" data-color="#ffffff" style="background:#ffffff;"></button>
          <button class="color-swatch" data-color="#e94560" style="background:#e94560;"></button>
          <button class="color-swatch" data-color="#533483" style="background:#533483;"></button>
          <button class="color-swatch" data-color="#16c79a" style="background:#16c79a;"></button>
          <button class="color-swatch" data-color="#f7b731" style="background:#f7b731;"></button>
          <button class="color-swatch" data-color="#3867d6" style="background:#3867d6;"></button>
          <button class="color-swatch" data-color="#fd9644" style="background:#fd9644;"></button>
          <button class="color-swatch" data-color="#a5b1c2" style="background:#a5b1c2;"></button>
        </div>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-group">
        <label class="tool-label">Size</label>
        <input type="range" id="stroke-width" min="1" max="20" value="3" class="stroke-slider">
        <span id="stroke-width-value" class="stroke-value">3</span>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-group">
        <button id="undo-btn" class="tool-btn action-btn" title="Undo (Ctrl+Z)">&#8617;</button>
        <button id="redo-btn" class="tool-btn action-btn" title="Redo (Ctrl+Y)">&#8618;</button>
        <button id="clear-btn" class="tool-btn action-btn" title="Clear Canvas">&#128465;</button>
      </div>
    </aside>

    <main id="canvas-container" class="canvas-container">
      <canvas id="whiteboard-canvas"></canvas>
      <div id="cursors-layer" class="cursors-layer"></div>
      <textarea id="text-input-overlay" class="text-input-overlay hidden" rows="1"></textarea>
    </main>

    <div id="zoom-controls" class="zoom-controls glass">
      <button id="zoom-in-btn" class="btn-icon-sm">+</button>
      <span id="zoom-level" class="zoom-level">100%</span>
      <button id="zoom-out-btn" class="btn-icon-sm">-</button>
      <button id="zoom-fit-btn" class="btn-icon-sm" title="Fit">&#8689;</button>
    </div>

    <div id="notifications" class="notifications"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/toolbar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
