# Horizontal Scaling Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.scale.yml up -d --scale app=3


services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  app:
    ports: []
    environment:
      - ADAPTER_MODE=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    mem_limit: 64m
    cpus: 0.15
    restart: unless-stopped
